aid: liveramp
name: LiveRamp
description: LiveRamp is a data connectivity platform that enables enterprises to
  safely connect, control, and activate first-party customer data across the digital
  ecosystem. Their developer platform exposes a suite of REST APIs for identity resolution,
  data activation, clean-room collaboration, marketplace data access, and privacy-first
  authenticated traffic.
type: Index
position: Consuming
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Data Connectivity
- Identity Resolution
- Activation
- Clean Room
- Privacy
- AdTech
url: https://raw.githubusercontent.com/api-evangelist/liveramp/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-05-19'
specificationVersion: '0.19'
apis:
- aid: liveramp:activation-api
  name: LiveRamp Activation API
  description: Programmatic activation of first-party and marketplace data across
    destination partners and connected platforms in the LiveRamp network.
  humanURL: https://developers.liveramp.com/activation-api
  tags:
  - Activation
  - AdTech
  - Marketing
  properties:
