- aid: liveramp:ats-api
  name: LiveRamp Authenticated Traffic Solution (ATS) API
  description: Privacy-first, PII-based authentication API enabling programmatic addressability
    without third-party cookies via RampID envelopes.
  humanURL: https://developers.liveramp.com/authenticatedtraffic-api
  tags:
  - Identity
  - Privacy
  - Authentication
  properties:
  - type: Documentation
    url: https://developers.liveramp.com/authenticatedtraffic-api
- aid: liveramp:clean-room-api
  name: LiveRamp Clean Room API
  description: API for setting up and managing clean rooms, data sources, and collaborative
    analytics queries between data partners.
  humanURL: https://developers.liveramp.com/clean-room-api
  tags:
  - Clean Room
  - Data Collaboration
  - Privacy
  properties:
  - type: Documentation
    url: https://developers.liveramp.com/clean-room-api
- aid: liveramp:datamarketplace-buyer-api
  name: LiveRamp Data Marketplace Buyer API
  description: API enabling platforms to host third-party segments from the LiveRamp
    Data Marketplace and access detailed segment metadata.
  humanURL: https://developers.liveramp.com/datamarketplace-buyer-api
  tags:
  - Data Marketplace
  - Segments
  - AdTech
  properties:
  - type: Documentation
    url: https://developers.liveramp.com/datamarketplace-buyer-api
- aid: liveramp:abilitec-api
  name: LiveRamp AbiliTec API
  description: Identity resolution API that resolves offline PII data into stable
    AbiliTec links for enterprise customer-database unification.
  humanURL: https://developers.liveramp.com/abilitec-api
  tags:
  - Identity
  - Resolution
  - PII
  properties:
  - type: Documentation
    url: https://developers.liveramp.com/abilitec-api
- aid: liveramp:rampid-api
  name: LiveRamp RampID API
  description: API for matching data to the LiveRamp Identity Graph, including envelope
    decryption and translation between pseudonymous identifiers.
  humanURL: https://developers.liveramp.com/rampid-api
  tags:
  - Identity
  - RampID
  - Pseudonymous
  properties:
  - type: Documentation
    url: https://developers.liveramp.com/rampid-api
- aid: liveramp:job-management-api
  name: LiveRamp Safe Haven Job Management API
  description: Automates Python, PySpark, and BigQuery jobs running in LiveRamp's
    Safe Haven Analytics Environment.
  humanURL: https://developers.liveramp.com/ae-job-management-api
  tags:
  - Analytics
  - Automation
  - Jobs
  properties:
  - type: Documentation
    url: https://developers.liveramp.com/ae-job-management-api
- aid: liveramp:privacy-api
  name: LiveRamp Privacy API
  description: Automates data subject requests including opt-outs, deletions, and
    consent updates across the LiveRamp ecosystem.
  humanURL: https://developers.liveramp.com/privacy-api
  tags:
  - Privacy
  - Consent
  - Compliance
  properties:
  - type: Documentation
    url: https://developers.liveramp.com/privacy-api
- aid: liveramp:sidecar
  name: LiveRamp Sidecar
  description: Service enabling SSPs to decrypt RampID identity envelopes into DSP-specific
    identifiers for programmatic activation.
  humanURL: https://sidecar.readme.io/
  tags:
  - SSP
  - Programmatic
  - Identity
  properties:
  - type: Documentation
    url: https://sidecar.readme.io/
